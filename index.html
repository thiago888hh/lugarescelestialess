    <script type="module">
        const seedArticles = [
            {
                title: "Cuarto de Oración",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Hechos 2:42",
                content: "El cuarto de oración no solo es una habitación física sino el lugar y momento donde vemos en comunidad la belleza de Jesucristo. La vida en comunidad comienza en un cuarto de oración (Hechos 2:42). La iglesia primitiva vivía con una teología sana, pero también con la parte práctica de las oraciones y partir el pan juntos."
            },
            {
                title: "Cristología",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Hebreos 1:1-2",
                content: "La cristología es un asunto que el Padre quiere revelarnos en estos days, aunque <span class='bg-vintage-accent/10 px-1 font-medium rounded-sm'>siempre fue un asunto teológico e histórico</span>. Si la cristología no es el centro de nuestros contextos eclesiales y étnicos, estamos errados en nuestro pensamiento. <strong class='text-vintage-accent tracking-wide uppercase text-base block my-2 font-semibold'>¡Cuán importante es la cristología en los contextos eclesiales y étnicos!</strong> La cristología lo es todo: es la base del evangelio, es su clímax, su desenlace. La cristología es el evangelio (Hebreos 1:1-2).\n\n<blockquote class='border-l-2 border-vintage-accent/40 pl-4 my-6 italic text-vintage-black/80 font-serif text-xl md:text-2xl tracking-wide bg-vintage-accentLight py-3 px-4 rounded-r-sm shadow-sm'>\"En otros tiempos el Padre nos hablaba por medio de los profetas y otros medios. Pero en estos últimos días nos habla por medio de su Hijo.\"\n<cite class='block text-xs uppercase tracking-widest text-vintage-gray font-sans font-semibold not-italic mt-2'>— Carlos Smarra</cite></blockquote>\n\nQue juntos podamos ser nutridos de esta realidad y ser edificados a medida que lo contemplamos (Efesios 4:13, 2 Corintios 3:18)."
            },
            {
                title: "La Identidad de la Iglesia Primitiva y su Ortodoxia",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Lucas 24:25-27",
                // Guardamos el nombre del archivo PDF generado aquí para el botón de descarga
                pdfUrl: "La_Identidad_de_la_Iglesia_Primitiva.pdf", 
                content: "La cristología temprana fue la identidad de la iglesia primitiva, la base de la iglesia primitiva estaba fundamentada en una identidad teológica e histórica (Hch 2) el pentecostés fue la marca de identidad de una iglesia que recién estaba \"naciendo\".\n\n¡¡El desarrollo de la iglesia es tan glorioso!! Recorrer las bases y el desarrollo de la iglesia como material de discipulado es algo que genera vidas de devoción teológica.\n\n<strong class='text-vintage-accent tracking-wide uppercase text-base block my-2 font-semibold'>LO QUE ENSEÑAMOS ES LA IDENTIDAD DE LA IGLESIA:</strong> La ortodoxia de Cristo es un asunto de identidad teológica, lo que nos fue enseñado no solo debe ser una fuente de información sino también de restauración. <span class='bg-vintage-accent/10 px-1 font-medium rounded-sm'>No encontrar belleza en lo que enseñamos y se nos fue enseñado es por falta de identidad</span>, enseñar la misma narrativa todos los días les dejó claro algo a los discípulos: <em>\"esta es la creencia que debemos seguir hasta el fin de nuestros días, incluso morir por ella\"</em>.\n\nEl martirio bíblico e histórico siempre fue por un tema de ortodoxia (algo enseñado), nuestras creencias siempre han desafiado a este sistema corrompido y ahí entendemos <strong class='uppercase tracking-wider text-vintage-black block my-2 font-bold'>CUAN NECESARIO ES MIEMBROS CON EL CONOCIMIENTO DE NUESTRA ORTODOXIA</strong> (Lc 24:25-27).\n\nCuando los miembros de nuestra iglesia local tienen una necesidad de información y encuentro es necesario una experiencia de concilio donde la enseñanza central sea Cristo, y una de las cosas más deslumbrantes de la cristología es que puede ser enseñada a cualquiera, en este contexto eclesial <span class='bg-vintage-accent/10 px-1 font-medium rounded-sm'>debemos darle valor a enseñar</span>.\n\nLa pregunta es: ¿qué es lo que provoca lo que enseñas en los corazones? Porque el tema que enseñen determina su impacto, y cuando vamos a las escrituras y vemos a los apóstoles enseñando cristología como el clímax de enseñanza nos damos cuenta su <span class='bg-vintage-accent/10 px-1 font-medium rounded-sm'>impacto social y cultural</span>. ¿Cuáles fueron?\n\n<ul class='list-none pl-2 space-y-1.5 my-4 font-sans text-base text-vintage-black font-semibold'>\n  <li><span class='bg-vintage-accent/10 px-1 rounded-sm'>1. La plantación de iglesias.</span></li>\n  <li><span class='bg-vintage-accent/10 px-1 rounded-sm'>2. Comunidades integrales ancladas al evangelio.</span></li>\n  <li><span class='bg-vintage-accent/10 px-1 rounded-sm'>3. Identidad eclesial.</span></li>\n</ul>"
            },
            {
                title: "Israel",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Romanos 11:1-2",
                content: "Israel es un asunto bíblico e histórico, el antisemitismo es el gran enemigo pero ¿qué debe hacer la iglesia ante esta situación? <strong class='text-vintage-accent tracking-wider underline underline-offset-4 pl-1 font-semibold'>RESPONDER</strong>.\n\n<blockquote class='border-l-2 border-vintage-accent/40 pl-4 my-6 italic text-vintage-black/80 font-serif text-xl md:text-2xl tracking-wide bg-vintage-accentLight py-3 px-4 rounded-r-sm shadow-sm'>\"Señor Jesucristo, me ofrezco para <span class='bg-vintage-accent/10 px-1 font-medium not-italic rounded-sm'>ayudar a tu pueblo</span> de cualquier manera posible. En cualquier lugar. En cualquier momento.\"\n<cite class='block text-xs uppercase tracking-widest text-vintage-gray font-sans font-semibold not-italic mt-2'>— Corrie Ten Boom</cite></blockquote>\n\nIsrael ha sido destinado como un lugar de descanso eterno para un Rey judío. <span class='bg-vintage-accent/10 px-1 font-medium rounded-sm'>La cristología temprana del A.T. nace en una identidad judía</span> y su desarrollo nos sigue mostrando lo mismo: Jesucristo es judío. La iglesia ha caído en el antisemitismo, pero eso no puede suceder en una iglesia teológicamente preparada."
            },
            {
                title: "Recursos para tu Iglesia",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Efesios 4:13-14",
                content: "Este espacio es para que puedas tomar cada artículo y enseñanza que pueda edificar tu casa local con fines de discipulado. Creemos en un cuerpo que se edifica mutuamente por la contemplación, pero también por la información teológica. Es clave desarrollar vidas de devoción teológica para que los miembros no sean engañados (Efesios 4:13-14). Vivimos en una era donde por internet y en muchos lugares circulan herejías y, por no haber un discipulado teológicamente correcto, muchos son engañados. Sea cual sea tu contexto eclesial, debemos ser afirmados en las Escrituras."
            }
        ];

        window.onload = function() {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            renderArticles(seedArticles);
        };

        function renderArticles(list) {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';
            
            if(list.length === 0) {
                container.innerHTML = `<p class="font-serif italic text-vintage-gray text-center py-8">No se encontraron artículos.</p>`;
                return;
            }

            list.forEach(article => {
                const item = document.createElement('div');
                item.className = `flex items-center justify-between py-5 group cursor-pointer hover:bg-vintage-creamDark/45 transition duration-300 px-4 -mx-4 border-b border-vintage-border`;
                
                item.addEventListener('click', () => showDetail(article));
                
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-2 h-2 rounded-full bg-vintage-accent opacity-0 group-hover:opacity-100 transition duration-300"></div>
                        <div>
                            <span class="font-sans text-[9px] uppercase tracking-widest text-vintage-accent font-semibold block">${article.author}</span>
                            <h3 class="font-serif text-lg text-vintage-black font-medium group-hover:text-vintage-accent transition duration-200 mt-0.5">${article.title}</h3>
                        </div>
                    </div>
                    <div class="text-vintage-gray/50 group-hover:text-vintage-black transition duration-300 text-sm font-serif italic">
                        ${article.reference || ''} &rarr;
              0     </div>
                `;
                container.appendChild(item);
            });
        }

        window.filterArticles = function() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = seedArticles.filter(a => 
                a.title.toLowerCase().includes(query) || 
                a.content.toLowerCase().includes(query) || 
                a.author.toLowerCase().includes(query)
            );
           renderArticles(filtered);
        };

        window.showDetail = function(article) {
            document.getElementById('detail-title').textContent = article.title;
            document.getElementById('detail-author').textContent = article.author;
            document.getElementById('detail-reference').textContent = article.reference || "";
            document.getElementById('detail-content').innerHTML = article.content;
            
            // Manejo dinámico del botón de descarga
            const downloadBtn = document.getElementById('detail-download-btn');
            if (article.pdfUrl) {
                downloadBtn.href = article.pdfUrl;
                downloadBtn.classList.remove('hidden');
                downloadBtn.classList.add('flex');
            } else {
                downloadBtn.classList.add('hidden');
                downloadBtn.classList.remove('flex');
            }
            
            switchTab('detail');
        };

        window.switchTab = function(tabId) {
            document.getElementById('view-feed').classList.toggle('hidden', tabId !== 'feed');
            document.getElementById('view-article-detail').classList.toggle('hidden', tabId !== 'detail');
            document.getElementById('hero-section').classList.toggle('hidden', tabId === 'detail');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>
