<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lugares Celestiales - Archivo Teológico</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        vintage: {
                            bg: '#FAF9F6',
                            black: '#1A1A1A',
                            gray: '#6B6A67',
                            border: '#E8E6E0',
                            creamDark: '#F2F0EB',
                            accent: '#8C7547',
                            accentLight: '#FAF6EE'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #FAF9F6; color: #1A1A1A; -webkit-font-smoothing: antialiased; }
        .noise-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.04; z-index: 10; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .hero-bg { background-image: url('https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .hero-overlay { background: linear-gradient(to bottom, rgba(26,26,26,0.3) 0%, rgba(26,26,26,0.85) 100%); }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative select-none">
    <div class="noise-overlay"></div>

    <nav class="bg-vintage-bg/95 border-b border-vintage-border sticky top-0 z-40 w-full backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="font-serif text-xl md:text-2xl leading-none uppercase tracking-widest cursor-pointer text-vintage-black hover:opacity-80 transition text-center md:text-left" onclick="switchTab('feed')">
                LUGARES<br><span class="text-vintage-accent">CELESTIALES.</span>
            </div>
            <div class="flex flex-wrap justify-center items-center gap-6 font-sans text-xs uppercase tracking-widest font-semibold">
                <button onclick="switchTab('feed')" id="nav-feed" class="text-vintage-black border-b border-vintage-black pb-1 transition duration-200">
                    Inicio
                </button>
            </div>
        </div>
    </nav>

    <div id="hero-section" class="relative h-[48vh] w-full hero-bg flex flex-col transition-all duration-500">
        <div class="absolute inset-0 hero-overlay"></div>
        <div class="relative z-20 flex-grow flex items-center justify-center px-4 text-center pb-8">
            <div class="max-w-3xl">
                <h1 class="font-serif text-white text-3xl md:text-5xl lg:text-6xl leading-tight font-medium drop-shadow-md">
                    La teología es la base de una iglesia sana.
                </h1>
                <div class="w-16 h-[1px] bg-vintage-accent mx-auto mt-6"></div>
            </div>
        </div>
    </div>

    <main class="flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 py-10">
        <div id="view-feed" class="block space-y-8 fade-in">
            <div class="text-center">
                <h2 class="font-serif text-2xl md:text-3xl text-vintage-black">Enseñanza y materiales</h2>
                <div class="w-8 h-[1px] bg-vintage-gray mx-auto mt-3 mb-4"></div>
            </div>
            <div class="max-w-md mx-auto relative mb-8">
                <input type="text" id="search-input" oninput="filterArticles()" placeholder="Buscar..." class="w-full bg-vintage-creamDark/60 border border-vintage-border rounded-full py-2.5 pl-10 pr-4 font-serif text-sm focus:outline-none focus:ring-1 focus:ring-vintage-accent focus:border-vintage-accent transition-all">
                <div class="absolute left-3.5 top-3 text-vintage-gray">
                    <i class="fas fa-search text-xs"></i>
                </div>
            </div>
            <div id="articles-container" class="flex flex-col">
                <div class="py-12 text-center">
                    <span class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-vintage-black"></span>
                    <p class="font-serif italic text-vintage-gray text-sm mt-3">Sincronizando archivo...</p>
                </div>
            </div>
        </div>

        <div id="view-article-detail" class="hidden fade-in">
            <button onclick="switchTab('feed')" class="flex items-center gap-2 text-vintage-gray hover:text-vintage-black font-sans text-xs uppercase tracking-wider mb-8 transition">
                &larr; Volver
            </button>
            <article class="bg-vintage-bg border border-vintage-border p-6 md:p-12 shadow-sm rounded-sm relative">
                <header class="text-center border-b border-vintage-border pb-8 mb-8">
                    <span id="detail-reference" class="font-sans text-xs uppercase tracking-[0.2em] text-vintage-accent block mb-3"></span>
                    <h1 id="detail-title" class="font-serif text-3xl md:text-5xl text-vintage-black font-medium leading-tight mb-4"></h1>
                    <div class="font-serif italic text-vintage-gray text-base md:text-lg">
                        Escrito por <span id="detail-author" class="font-medium text-vintage-black"></span>
                    </div>
                </header>
                <div class="flex flex-col items-center mb-8">
                    <div class="relative w-full max-w-2xl h-64 md:h-96 overflow-hidden bg-neutral-100 border border-vintage-border rounded-sm shadow-inner">
                        <img id="detail-image" src="" alt="Artículo" class="w-full h-full object-cover grayscale opacity-95 hover:grayscale-0 transition duration-700">
                    </div>
                </div>
                <div id="detail-content" class="font-serif text-lg md:text-xl text-vintage-black leading-relaxed space-y-6 max-w-2xl mx-auto whitespace-pre-line">
                </div>
            </article>
        </div>
    </main>

    <footer class="bg-vintage-bg border-t border-vintage-border mt-auto py-8">
        <div class="max-w-3xl mx-auto px-4 text-center text-vintage-gray font-sans text-[10px] uppercase tracking-widest">
            &copy; <span id="current-year"></span> Lugares Celestiales.
        </div>
    </footer>

    <script type="module">
        const seedArticles = [
            {
                title: "Cuarto de Oración",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Hechos 2:42",
                content: "El cuarto de oración no es solo un lugar físico sino un lugar y momento donde vemos en comunidad la belleza de Jesucristo. La vida en comunidad comienza en un cuarto de oración (Hechos 2:42). La iglesia primitiva vivía con una teología sana, pero también con la práctica de las oraciones y de partir el pan juntos.",
                imageUrl: "https://images.unsplash.com/photo-1543165796-5426273eaab3?w=800&h=600&fit=crop"
            },
            {
                title: "Cristología",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Hebreos 1:1-2",
                content: "la cristología es un asunto que el padre quiere revelarnos en estos dias, aunque siempre fue un asunto teologico e historico, <strong>si la cristología no es el centro de nuestros contextos eclesiales y etnicos estamos errados en nuestros pensamientos, cuan importante es la cristologia en los contextos ecelsiales y etnico</strong> la cristología lo es todo, es la base del evangelio es el decenlase, la cristología es el evangelio, los apostoles y profetas se nutrian de la cristología temprana del A. T (hebreos 1:1-2)\n\n" +
                         "<div class=\"border-l-4 border-vintage-accent pl-4 py-2 my-6 italic text-vintage-gray bg-vintage-creamDark/40 pr-3 rounded-r-sm\">«En otros tiempos el padre nos hablaba por medios de los profetas y otros medios. pero en estos últimos días nos habla por medio del hijo»<br><span class=\"block text-xs font-sans uppercase tracking-widest font-semibold text-vintage-accent mt-1.5 not-italic\">— CARLOS SMARRA</span></div>\n\n" +
                         "Que juntos podamos ser nutridos de esta realidad y ser edificados a medida que lo contemplamos (efesios 4:13-14, 2 corintios 3:18)",
                imageUrl: "WhatsApp Image 2026-06-17 at 18.15.25.jpeg"
            },
            {
                title: "Israel",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Romanos 11:1-2",
                content: "israel es un asunto biblico e historico, el antisemitismo es el gran enemigo pero ¿que debe hacer la igle ante esta situacion?\n\n" +
                         "<div class=\"border-l-4 border-vintage-accent pl-4 py-2 my-6 italic text-vintage-gray bg-vintage-creamDark/40 pr-3 rounded-r-sm\"><strong>«señor Jesucristo, me ofrezco para ayudar a tu pueblo. De cualquier manera posible. En cualquier lugar. En cualquier momento»</strong><br><span class=\"block text-xs font-sans uppercase tracking-widest font-semibold text-vintage-accent mt-1.5 not-italic\">— CORRIE TEN BOOM</span></div>\n\n" +
                         "israel ha sido destinado como el lugar de descanso eterno para un rey judio, la cristología temprana del A.T nace en una identidad judía, y su desarrollo nos sigue contando lo mismo JESUSCRISTO ES JUDIO (mt 23:37) el celo por Israel fue un pilar en el ministerio de Jesús, su compromiso con lo local es clave para el desarrollo global. la iglesia ha caido en el antisemitismo pero eso no puede suceder en una iglesia teologicamente preparada.\n\n<span class=\"block font-sans uppercase text-[11px] font-bold text-vintage-accent tracking-widest mt-8\">IREMOS DEJANDO MATERIAL EN FORMATO PDF PARA EL DISIPULADO EN ESTA AREA</span>",
                imageUrl: "WhatsApp Image 2026-06-17 at 18.15.25 (3).jpeg"
            },
            {
                title: "Recursos para tu Iglesia",
                author: "LUGARES CELESTIALES | THIAGO FRANZA",
                reference: "Efesios 4:13-14",
                content: "Este espacio es para que puedas tomar cada artículo y enseñanza que pueda edificar tu casa local con fines de discipulado. Creemos en un cuerpo que se edifica mutuamente por la contemplación, mas también por la información teológica. Es clave desarrollar vidas de devoción teológica para que los miembros no sean engañados (Efesios 4:13-14). Vivimos en una era donde por internet y muchos lugares circulan herejías y, por no haber un discipulado teológicamente correcto, muchos son engañados. Sea cual sea tu contexto eclesial, debemos ser afirmados en las Escrituras.",
                imageUrl: "WhatsApp Image 2026-06-17 at 18.15.25 (2).jpeg"
            }
        ];

        window.onload = function() {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            renderArticles(seedArticles);
        };

        function renderArticles(list) {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';
            list.forEach(article => {
                const item = document.createElement('div');
                item.className = `flex items-center justify-between py-6 group cursor-pointer hover:bg-vintage-creamDark/45 transition duration-300 px-3 -mx-3 border-b border-vintage-border`;
                item.onclick = () => showDetail(article);
                item.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div class="relative w-16 h-16 bg-neutral-200 overflow-hidden border border-vintage-border rounded-sm">
                            <img src="${article.imageUrl}" class="w-full h-full object-cover grayscale">
                        </div>
                        <div>
                            <span class="font-sans text-[9px] uppercase tracking-widest text-vintage-accent font-semibold block">${article.author}</span>
                            <h3 class="font-serif text-lg text-vintage-black font-semibold mt-1">${article.title}</h3>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.filterArticles = function() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = seedArticles.filter(a => a.title.toLowerCase().includes(query) || a.content.toLowerCase().includes(query));
            renderArticles(filtered);
        }

        function showDetail(article) {
            document.getElementById('detail-title').textContent = article.title;
            document.getElementById('detail-author').textContent = article.author;
            document.getElementById('detail-reference').textContent = article.reference;
            document.getElementById('detail-content').innerHTML = article.content;
            document.getElementById('detail-image').src = article.imageUrl;
            switchTab('detail');
        }

        window.switchTab = function(tabId) {
            document.getElementById('view-feed').classList.toggle('hidden', tabId !== 'feed');
            document.getElementById('view-article-detail').classList.toggle('hidden', tabId !== 'detail');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
```eof
