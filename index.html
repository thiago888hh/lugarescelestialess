<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lugares Celestiales - Archivo Teológico</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        vintage: {
                            bg: '#FAF9F6',
                            black: '#1A1A1A',
                            gray: '#6B6A67',
                            border: '#E8E6E0',
                            creamDark: '#F2F0EB',
                            accent: '#8C7547',
                            accentLight: '#FAF6EE'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #FAF9F6; color: #1A1A1A; -webkit-font-smoothing: antialiased; }
        .noise-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.04; z-index: 10; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .hero-bg { background-image: url('https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .hero-overlay { background: linear-gradient(to bottom, rgba(26,26,26,0.3) 0%, rgba(26,26,26,0.85) 100%); }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative select-none">
    <div class="noise-overlay"></div>

    <nav class="bg-vintage-bg/95 border-b border-vintage-border sticky top-0 z-40 w-full backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="font-serif text-xl md:text-2xl leading-none uppercase tracking-widest cursor-pointer text-vintage-black hover:opacity-80 transition text-center md:text-left" onclick="switchTab('feed')">
                LUGARES<br><span class="text-vintage-accent">CELESTIALES.</span>
            </div>
            <div class="flex flex-wrap justify-center items-center gap-6 font-sans text-xs uppercase tracking-widest font-semibold">
                <button onclick="switchTab('feed')" class="text-vintage-black border-b border-vintage-black pb-1 transition duration-200">Inicio</button>
            </div>
        </div>
    </nav>

    <div id="hero-section" class="relative h-[48vh] w-full hero-bg flex flex-col transition-all duration-500">
        <div class="absolute inset-0 hero-overlay"></div>
        <div class="relative z-20 flex-grow flex items-center justify-center px-4 text-center pb-8">
            <div class="max-w-3xl">
                <h1 class="font-serif text-white text-3xl md:text-5xl lg:text-6xl leading-tight font-medium drop-shadow-md">La teología es la base de una iglesia sana.</h1>
                <div class="w-16 h-[1px] bg-vintage-accent mx-auto mt-6"></div>
            </div>
        </div>
    </div>

    <main class="flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 py-10">
        <div id="view-feed" class="block space-y-8 fade-in">
            <div class="text-center">
                <h2 class="font-serif text-2xl md:text-3xl text-vintage-black">Enseñanza y materiales</h2>
            </div>
            <div id="articles-container" class="flex flex-col"></div>
        </div>

        <div id="view-article-detail" class="hidden fade-in">
            <button onclick="switchTab('feed')" class="flex items-center gap-2 text-vintage-gray hover:text-vintage-black font-sans text-xs uppercase tracking-wider mb-8 transition">&larr; Volver</button>
            <article class="bg-vintage-bg border border-vintage-border p-6 md:p-12 shadow-sm rounded-sm">
                <header class="text-center border-b border-vintage-border pb-8 mb-8">
                    <span id="detail-reference" class="font-sans text-xs uppercase tracking-[0.2em] text-vintage-accent block mb-3"></span>
                    <h1 id="detail-title" class="font-serif text-3xl md:text-5xl text-vintage-black font-medium mb-4"></h1>
                    <div class="font-serif italic text-vintage-gray text-base md:text-lg">Escrito por <span id="detail-author" class="font-medium text-vintage-black"></span></div>
                </header>
                <div class="flex flex-col items-center mb-8">
                    <img id="detail-image" src="" alt="Artículo" class="w-full max-w-2xl h-64 md:h-96 object-cover grayscale opacity-95">
                </div>
                <div id="detail-content" class="font-serif text-lg md:text-xl text-vintage-black leading-relaxed space-y-6 max-w-2xl mx-auto whitespace-pre-line"></div>
            </article>
        </div>
    </main>

    <script type="module">
        const seedArticles = [
            { 
                title: "Cuarto de Oración", 
                author: "LUGARES CELESTIALES | THIAGO FRANZA", 
                reference: "Hechos 2:42", 
                content: "El cuarto de oración no es solo un lugar físico sino un lugar y momento donde vemos en comunidad la belleza de Jesucristo. La vida en comunidad comienza en un cuarto de oración.", 
                imageUrl: "https://images.unsplash.com/photo-1507434967838-89c564344e6b?w=800" 
            },
            { 
                title: "Cristología", 
                author: "LUGARES CELESTIALES | THIAGO FRANZA", 
                reference: "Hebreos 1:1-2", 
                content: "La cristología es un asunto que el Padre quiere revelarnos en estos días, aunque <strong>siempre fue un asunto teológico e histórico</strong>. Si la cristología no es el centro de nuestros contextos eclesiales y étnicos, estamos errados en nuestro pensamiento. <strong>¡CUÁN IMPORTANTE ES LA CRISTOLOGÍA EN LOS CONTEXTOS ECLESIALES Y ÉTNICOS!</strong> La cristología lo es todo, es la base del evangelio, es su clímax y su desenlace; la cristología es el evangelio (Hebreos 1:1-2).\n\n“En otros tiempos el Padre nos hablaba por medio de los profetas y otros medios. Pero en estos últimos días nos habla por medio de su Hijo”. \n— <strong>Carlos Smarra</strong>\n\nQue juntos podamos ser nutridos de esta realidad y ser edificados a medida que lo contemplamos (Efesios 4:13, 2 Corintios 3:18).", 
                imageUrl: "https://images.unsplash.com/photo-1490300472337-775338341101?w=800" 
            },
            { 
                title: "La Iglesia", 
                author: "LUGARES CELESTIALES | THIAGO FRANZA", 
                reference: "Mateo 16:18", 
                content: "La iglesia no es un edificio, es un pueblo llamado a vivir bajo el señorío de Cristo. Es la columna y baluarte de la verdad en un mundo lleno de confusión. Somos piedras vivas siendo edificadas para ser una morada de Dios en el Espíritu.", 
                imageUrl: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=800" 
            },
            { 
                title: "Israel", 
                author: "LUGARES CELESTIALES | THIAGO FRANZA", 
                reference: "Romanos 11:1-2", 
                content: "Israel es un asunto bíblico e histórico. El antisemitismo es el gran enemigo, pero ¿qué debe hacer la iglesia ante esta situación? <strong>RESPONDER:</strong>\n\n“Señor Jesucristo, me ofrezco para ayudar a tu pueblo de cualquier manera posible. En cualquier lugar. En cualquier momento”. \n— <strong>Corrie ten Boom</strong>\n\nIsrael ha sido destinado como un lugar de descanso eterno para un Rey judío. <strong>La cristología temprana del A.T. nace en una identidad judía</strong> y su desarrollo nos sigue mostrando lo mismo: Jesucristo es judío. La iglesia ha caído en el antisemitismo, pero eso no puede suceder en una iglesia teológicamente preparada.", 
                imageUrl: "https://images.unsplash.com/photo-1587396014441-11d23467645f?w=800" 
            }
        ];

        window.onload = () => renderArticles(seedArticles);

        function renderArticles(list) {
            const container = document.getElementById('articles-container');
            container.innerHTML = '';
            list.forEach(article => {
                const item = document.createElement('div');
                item.className = "py-6 group cursor-pointer hover:bg-vintage-creamDark/45 transition border-b border-vintage-border px-3";
                item.onclick = () => showDetail(article);
                item.innerHTML = `
                    <div class="flex items-center gap-6">
                        <img src="${article.imageUrl}" class="w-16 h-16 object-cover grayscale group-hover:grayscale-0 transition">
                        <div>
                            <span class="text-[9px] uppercase tracking-widest text-vintage-accent font-semibold block">${article.author}</span>
                            <h3 class="font-serif text-lg text-vintage-black font-semibold">${article.title}</h3>
                        </div>
                    </div>`;
                container.appendChild(item);
            });
        }

        function showDetail(article) {
            document.getElementById('detail-title').textContent = article.title;
            document.getElementById('detail-author').textContent = article.author;
            document.getElementById('detail-reference').textContent = article.reference;
            document.getElementById('detail-content').innerHTML = article.content;
            document.getElementById('detail-image').src = article.imageUrl;
            switchTab('detail');
        }

        window.switchTab = (tabId) => {
            document.getElementById('view-feed').classList.toggle('hidden', tabId !== 'feed');
            document.getElementById('view-article-detail').classList.toggle('hidden', tabId !== 'detail');
            document.getElementById('hero-section').classList.toggle('hidden', tabId === 'detail');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
